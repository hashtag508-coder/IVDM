name: Build IVDM APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

    - name: Install Python dependencies
      run: |
        pip install buildozer cython virtualenv

    - name: Create buildozer spec
      run: |
        buildozer init
        sed -i 's/title = My Application/title = IVDM/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = ivdm/' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = org.ivdm/' buildozer.spec
        sed -i 's/^requirements = python3,kivy/requirements = python3,flask,yt-dlp,certifi/' buildozer.spec
        sed -i 's/#android.permissions = INTERNET/android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE/' buildozer.spec
        sed -i 's/android.archs = arm64-v8a, armeabi-v7a/android.archs = arm64-v8a/' buildozer.spec

    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tail -20

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: IVDM-APK
        path: bin/*.apk
