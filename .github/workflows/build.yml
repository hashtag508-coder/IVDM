name: Build IVDM APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
        pip install buildozer cython

    - name: Create spec
      run: |
        printf '[app]\ntitle = IVDM\npackage.name = ivdm\npackage.domain = org.ivdm\nsource.dir = .\nsource.include_exts = py,png,jpg,kv,atlas\nversion = 1.0\nrequirements = python3,kivy,yt-dlp,certifi\norientation = portrait\nandroid.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE\nandroid.api = 33\nandroid.minapi = 21\nandroid.archs = arm64-v8a\nandroid.accept_sdk_license = True\n[buildozer]\nlog_level = 2\n' > buildozer.spec

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: IVDM-APK
        path: bin/*.apk
